<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>模板标签的使用</title>
</head>
<body>
    <a href="#">{{name|cut:" "}}约么？</a>
    <a href="#">{{protagonist}}约</a>
    <a href="#">{{name}}去哪里？</a>
    <h1>这部分代码将要演示模板变量</h1>
    这个变量是字符串对象：{{books_name}}<br>
    这个变量是函数对象：{{hello}}<br>
    这个变量是类方法对象：{{fruit.name}}<br>
    这个变量是类对象，访问类对象的属性: {{fruit.say}}<br>
    这个变量是列表对象：{{ list }}<br>
    这个变量是列表对象，访问列表的元素{{list.1 }}<br>
    这个变量是字典对象：{{dict}}<br>
    这个变量是字典对象，访问字典的键{{dict.a }}<br>
</body>
</html>
